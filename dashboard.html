<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>「安心問」數據儀表板｜臺北榮民總醫院蘇澳暨員山分院</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:#0D1B3E;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;}

/* ── layout ── */
.page{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem;}

/* ── header ── */
.header{text-align:center;padding:1.5rem 1rem 1.25rem;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:0.75rem;}
.logo-dot{width:6px;height:6px;border-radius:50%;background:#D4A843;}
.logo-name{font-size:11px;color:#94A3B8;letter-spacing:0.5px;}
.header h1{font-size:22px;font-weight:600;color:#fff;line-height:1.4;margin-bottom:0.3rem;}
.header-sub{font-size:13px;color:#94A3B8;}
.last-update{display:inline-block;background:#142454;color:#F0CC7A;font-size:11px;padding:4px 12px;border-radius:20px;margin-top:0.6rem;border:0.5px solid #1E3166;}

/* ── nav link ── */
.nav-row{display:flex;justify-content:center;gap:10px;margin:1rem 0 1.5rem;}
.nav-btn{background:#142454;color:#94A3B8;border:0.5px solid #1E3166;border-radius:24px;padding:7px 18px;font-size:13px;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.nav-btn:hover{border-color:#D4A843;color:#F0CC7A;}
.nav-btn.active{background:#D4A843;color:#0D1B3E;border-color:#D4A843;font-weight:500;}

/* ── stat cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
@media(max-width:520px){.stat-grid{grid-template-columns:1fr 1fr;}}
.stat-card{background:#142454;border-radius:14px;padding:1.1rem 1.2rem;border:0.5px solid #1E3166;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;right:-12px;bottom:-12px;width:60px;height:60px;border-radius:50%;background:#1E3166;}
.stat-label{font-size:11px;color:#94A3B8;margin-bottom:6px;letter-spacing:0.3px;}
.stat-num{font-size:36px;font-weight:700;color:#D4A843;line-height:1;margin-bottom:4px;}
.stat-unit{font-size:12px;color:#F0CC7A;}
.stat-card.teal .stat-num{color:#5DCAA5;}
.stat-card.rose .stat-num{color:#EAB8C0;}

/* ── chart cards ── */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
@media(max-width:520px){.chart-row{grid-template-columns:1fr;}}
.chart-card{background:#142454;border-radius:14px;padding:1.1rem 1.2rem;border:0.5px solid #1E3166;}
.chart-card.full{grid-column:1/-1;}
.chart-title{font-size:13px;font-weight:500;color:#F0CC7A;margin-bottom:1rem;}
.chart-wrap{position:relative;height:200px;}
.chart-wrap.tall{height:260px;}

/* ── table ── */
.table-card{background:#142454;border-radius:14px;padding:1.1rem 1.2rem;border:0.5px solid #1E3166;margin-bottom:16px;}
.table-title{font-size:13px;font-weight:500;color:#F0CC7A;margin-bottom:0.9rem;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:#1E3166;color:#94A3B8;font-weight:500;padding:7px 10px;text-align:left;}
.tbl td{padding:8px 10px;color:#E2E8F0;border-bottom:0.5px solid #1E3166;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#1E316640;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;}
.badge.free{background:#0E9F8E30;color:#5DCAA5;border:0.5px solid #0E9F8E;}
.badge.paid{background:#D4A84330;color:#F0CC7A;border:0.5px solid #D4A843;}

/* ── empty / loading ── */
.loading{text-align:center;padding:3rem 1rem;color:#94A3B8;font-size:14px;}
.loading .spin{display:inline-block;width:28px;height:28px;border:3px solid #1E3166;border-top-color:#D4A843;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:0.75rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:2rem;color:#94A3B8;font-size:13px;}

/* ── refresh btn ── */
.refresh-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:none;border:0.5px solid #1E3166;border-radius:24px;padding:8px 20px;font-size:13px;color:#94A3B8;cursor:pointer;margin:0 auto 1.5rem;}
.refresh-btn:hover{border-color:#D4A843;color:#F0CC7A;}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="logo-row">
      <div class="logo-dot"></div>
      <div class="logo-name">臺北榮民總醫院蘇澳暨員山分院</div>
      <div class="logo-dot"></div>
    </div>
    <h1>「安心問」數據儀表板</h1>
    <div class="header-sub">ACP 給付方案查詢系統 · 即時使用統計</div>
    <div class="last-update" id="last-update">載入中…</div>
  </div>

  <div class="nav-row">
    <a href="index.html" class="nav-btn">🌸 前往安心問</a>
    <button class="nav-btn active" onclick="loadData()">📊 儀表板</button>
  </div>

  <button class="refresh-btn" onclick="loadData()">🔄 重新整理數據</button>

  <div id="content">
    <div class="loading">
      <div class="spin"></div><br>載入數據中…
    </div>
  </div>

</div>

<script>
// ── 請和 index.html 填入相同的 Apps Script 網址 ──────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqza-VllEu6tKrMGPOqOVUZ_fnyNX2afpg9hIHzqzd1otBX2jZX4uEGQWBPGEZnKxN/exec";
// ─────────────────────────────────────────────────────────────

let pieChart = null;
let barChart = null;
let trendChart = null;

async function loadData() {
  if (!SCRIPT_URL || SCRIPT_URL.startsWith("請貼")) {
    document.getElementById('content').innerHTML = `
      <div class="empty">⚠️ 請先在 dashboard.html 裡填入 Apps Script 網址<br><br>
      找到這一行：<br><code style="color:#F0CC7A;font-size:11px">const SCRIPT_URL = "請貼上您的..."</code><br><br>
      換成你的 Web App URL 後重新上傳即可</div>`;
    return;
  }

  document.getElementById('last-update').textContent = '載入中…';

  try {
    const res = await fetch(SCRIPT_URL + "?action=dashboard", { method: "GET" });
    const raw = await res.text();
    const json = JSON.parse(raw);
    if (json.status === 'ok') {
      renderDashboard(json.data);
    } else {
      showError();
    }
  } catch(e) {
    // Apps Script doGet 回傳的是使用紀錄 sheet 資料
    // fallback: 從 doGet 基本確認連線
    document.getElementById('last-update').textContent = '服務連線正常，等待數據…';
    showNoData();
  }
}

function showError() {
  document.getElementById('content').innerHTML =
    '<div class="empty">⚠️ 無法載入數據，請確認 Apps Script 網址正確且已部署</div>';
}

function showNoData() {
  document.getElementById('content').innerHTML =
    '<div class="empty">📭 目前尚無使用紀錄<br><br>民眾開始使用安心問後，數據將自動出現在這裡</div>';
}

function renderDashboard(data) {
  const now = new Date();
  document.getElementById('last-update').textContent =
    '最後更新：' + now.toLocaleString('zh-TW', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});

  const total    = data.total    || 0;
  const freeCount= data.freeCount|| 0;
  const paidCount= data.paidCount|| 0;
  const plans    = data.plans    || [];
  const recent   = data.recent   || [];
  const monthly  = data.monthly  || [];

  // destroy old charts
  if (pieChart)   { pieChart.destroy();   pieChart   = null; }
  if (barChart)   { barChart.destroy();   barChart   = null; }
  if (trendChart) { trendChart.destroy(); trendChart = null; }

  document.getElementById('content').innerHTML = `
    <!-- stat cards -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">📈 累計使用人次</div>
        <div class="stat-num">${total}</div>
        <div class="stat-unit">人次</div>
      </div>
      <div class="stat-card teal">
        <div class="stat-label">✅ 免費方案</div>
        <div class="stat-num">${freeCount}</div>
        <div class="stat-unit">人次（${total>0?Math.round(freeCount/total*100):0}%）</div>
      </div>
      <div class="stat-card rose">
        <div class="stat-label">🌸 優惠自費方案</div>
        <div class="stat-num">${paidCount}</div>
        <div class="stat-unit">人次（${total>0?Math.round(paidCount/total*100):0}%）</div>
      </div>
    </div>

    <!-- charts row -->
    <div class="chart-row">
      <div class="chart-card">
        <div class="chart-title">📊 方案分布</div>
        <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">🏆 各方案使用次數</div>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
    </div>

    <!-- trend -->
    <div class="chart-card full" style="margin-bottom:16px;">
      <div class="chart-title">📅 月使用趨勢</div>
      <div class="chart-wrap tall"><canvas id="trendChart"></canvas></div>
    </div>

    <!-- plan table -->
    <div class="table-card">
      <div class="table-title">📋 方案使用明細</div>
      <table class="tbl">
        <thead><tr><th>方案名稱</th><th>費用類型</th><th>使用次數</th><th>佔比</th></tr></thead>
        <tbody>
          ${plans.map(p=>`
            <tr>
              <td>${p.name}</td>
              <td><span class="badge ${p.type==='free'?'free':'paid'}">${p.type==='free'?'免費':'優惠自費'}</span></td>
              <td>${p.count}</td>
              <td>${total>0?Math.round(p.count/total*100):0}%</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <!-- recent table -->
    <div class="table-card">
      <div class="table-title">🕐 最近 10 筆紀錄</div>
      <table class="tbl">
        <thead><tr><th>日期</th><th>時間</th><th>方案</th><th>裝置</th></tr></thead>
        <tbody>
          ${recent.map(r=>`
            <tr>
              <td>${r.date}</td>
              <td>${r.time}</td>
              <td>${r.plan}</td>
              <td>${r.device==='mobile'?'📱 手機':'💻 電腦'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;

  // ── Pie chart ──
  const planColors = ['#D4A843','#0E9F8E','#C9848F','#5B8ADE','#9F7AEA','#F6AD55','#68D391','#FC8181'];
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: plans.map(p=>p.name),
      datasets:[{ data: plans.map(p=>p.count), backgroundColor: planColors, borderWidth:2, borderColor:'#142454' }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ position:'bottom', labels:{ color:'#94A3B8', font:{size:10}, boxWidth:12, padding:8 }},
        tooltip:{ callbacks:{ label: ctx => ` ${ctx.label}：${ctx.raw} 次` }}
      }
    }
  });

  // ── Bar chart ──
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: plans.map(p => p.name.length > 8 ? p.name.slice(0,8)+'…' : p.name),
      datasets:[{
        data: plans.map(p=>p.count),
        backgroundColor: plans.map(p => p.type==='free' ? '#0E9F8E' : '#D4A843'),
        borderRadius: 6,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => ` ${ctx.raw} 次` }}},
      scales:{
        x:{ ticks:{ color:'#94A3B8', font:{size:10} }, grid:{color:'#1E3166'} },
        y:{ ticks:{ color:'#94A3B8', font:{size:10} }, grid:{color:'#1E3166'}, beginAtZero:true }
      }
    }
  });

  // ── Trend chart ──
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: monthly.map(m=>m.month),
      datasets:[{
        label:'月使用人次',
        data: monthly.map(m=>m.count),
        borderColor:'#D4A843', backgroundColor:'#D4A84320',
        tension:0.4, fill:true, pointBackgroundColor:'#D4A843', pointRadius:5,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#94A3B8' }}},
      scales:{
        x:{ ticks:{ color:'#94A3B8' }, grid:{color:'#1E3166'} },
        y:{ ticks:{ color:'#94A3B8' }, grid:{color:'#1E3166'}, beginAtZero:true }
      }
    }
  });
}

// 自動載入
loadData();
// 每 5 分鐘自動刷新
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
