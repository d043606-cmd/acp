html,body{min-height:100%;background:#FDF6F8;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;color:#2C1A1E;}
:root{

.app{max-width:430px;margin:0 auto;padding:0 0 4rem;min-height:100vh;}

.header{text-align:center;padding:2rem 1.5rem 1.25rem;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:1rem;}

.logo-name{font-size:11px;color:var(--pink-dark);letter-spacing:0.5px;}
.header h1{font-size:20px;font-weight:600;color:var(--text1);line-height:1.5;margin-bottom:0.4rem;}

.step-bar{display:flex;align-items:center;justify-content:center;padding:0 1.25rem 1.25rem;}
.step-node{display:flex;flex-direction:column;align-items:center;gap:4px;}
.step-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border:1.5px solid #E0C8CC;color:var(--text3);background:#fff;transition:all 0.3s;}
.step-circle.active{background:var(--pink);border-color:var(--pink);color:#fff;}
.step-circle.done{background:var(--pink-mid);border-color:var(--pink-mid);color:var(--pink-dark);font-size:11px;}
.step-lbl{font-size:9px;color:var(--text3);white-space:nowrap;}
.step-lbl.active{color:var(--pink-dark);font-weight:500;}
.step-ln{width:22px;height:1px;background:#E8D0D4;margin-bottom:14px;transition:background 0.3s;}
.step-ln.done{background:var(--pink-mid);}

.q-card{margin:0 1rem 1rem;background:#fff;border-radius:var(--radius);border:0.5px solid #F0D8DC;overflow:hidden;box-shadow:0 2px 12px rgba(180,100,115,0.07);}

.q-top-left{flex:1;}
.q-step-tag{display:inline-block;background:var(--pink-light);color:var(--pink-dark);font-size:10px;padding:3px 10px;border-radius:20px;margin-bottom:0.5rem;border:0.5px solid var(--pink-mid);}
.q-top h2{font-size:17px;font-weight:600;color:var(--text1);line-height:1.55;}
.q-top-icon{font-size:36px;flex-shrink:0;margin-top:4px;}
.q-divider{height:1px;background:#F5DDE0;margin:0 1.25rem;}
.q-body{padding:1rem 1.25rem;}

.opt-list{display:flex;flex-direction:column;gap:8px;}
.opt-btn{display:flex;align-items:center;gap:10px;background:#fff;border:0.5px solid #EED4D8;border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text1);cursor:pointer;text-align:left;line-height:1.45;transition:all 0.18s;width:100%;-webkit-tap-highlight-color:transparent;}
.opt-btn:hover,.opt-btn:active{background:var(--pink-light);border-color:var(--pink);color:var(--pink-dark);}
.opt-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
.opt-text{flex:1;}
.opt-sub{font-size:11px;color:var(--text3);margin-top:2px;display:block;}
.opt-btn:hover .opt-sub,.opt-btn:active .opt-sub{color:var(--pink);}

.disease-tag-wrap{margin-top:6px;padding:0 2px;}
.disease-toggle{display:inline-flex;align-items:center;gap:5px;background:var(--pink-light);color:var(--pink-dark);border:0.5px solid var(--pink-mid);border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.15s;line-height:1.4;}
.disease-toggle:active{background:var(--pink-mid);}

const LBLS = ['榮民身分','免費資格','符合條件','查詢結果'];

function renderBar(active, total){
  const bar = document.getElementById('step-bar');
  bar.innerHTML = '';
  const t = Math.max(total, 3);
  for(let i = 0; i <= t; i++){
    if(i > 0){
      const ln = document.createElement('div');
      ln.className = 'step-ln' + (i <= active ? ' done' : '');
      bar.appendChild(ln);
    }
    const nd = document.createElement('div'); nd.className = 'step-node';
    const ci = document.createElement('div');
    ci.className = 'step-circle' + (i === active ? ' active' : i < active ? ' done' : '');
    ci.textContent = i < active ? '✓' : (i + 1);
    const lb = document.createElement('div');
    lb.className = 'step-lbl' + (i === active ? ' active' : '');
    lb.textContent = LBLS[i] || '';
    nd.appendChild(ci); nd.appendChild(lb); bar.appendChild(nd);
  }
}

    toggle.classList.toggle('open', open);
  };
  wrap.appendChild(toggle);
  wrap.appendChild(list);
  return wrap;
}

function renderQ(qId){
  const q = QS.find(x => x.id === qId);
  renderBar(q.step, 3);
  const main = document.getElementById('main');
  main.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'q-card fade-in';
  card.innerHTML = `
    <div class="q-top">
      <div class="q-top-left">
        <span class="q-step-tag">${q.tag}</span>
        <h2>${q.q}</h2>
      </div>
      <div class="q-top-icon">${q.icon}</div>
    </div>
    <div class="q-divider"></div>
    <div class="q-body"><div class="opt-list" id="olist"></div></div>`;
  main.appendChild(card);
  const ol = document.getElementById('olist');
  q.opts.forEach(o => {
    const wrap = document.createElement('div');
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-icon">${o.i}</span><span class="opt-text">${o.l}${o.s ? `<span class="opt-sub">${o.s}</span>` : ''}</span>`;
    btn.onclick = () => pick(qId, o.v, o.key || '');
    wrap.appendChild(btn);
    if(o.disease){ wrap.appendChild(makeDiseaseBlock()); }
    ol.appendChild(wrap);
  });
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function pick(qId, val, key){
  if(qId === 'veteran'){ val === 'yes' ? renderQ('vet_fam') : renderQ('welfare'); return; }
  if(qId === 'vet_fam'){ const m={alone:'veteran_alone',one:'veteran_one',two:'veteran_two'}; showResult(m[val], key); return; }
  if(qId === 'welfare'){
    if(val === 'yes'){ showResult('welfare', key); return; }
    renderQ('nhi'); return;
  }
  if(qId === 'nhi'){
    if(val === 'yes'){ showResult('nhi', key); return; }
    renderQ('companion'); return;
  }
  if(qId === 'companion'){ const m={'1':'paid_1','2':'paid_2','3':'paid_3'}; showResult(m[val], key); return; }
}

function nl2p(text){
  return text.split('\n').map(t => `<p>${t}</p>`).join('');
}

// 部署 Apps Script 後，把 Web App URL 貼到下方引號內
const SCRIPT_URL = "請貼上您的_Apps_Script_Web_App_URL";

function sendTracking(planName, planType, amount) {
  if (!SCRIPT_URL || SCRIPT_URL.startsWith("請貼")) return;
  const device = /Mobi|Android/i.test(navigator.userAgent) ? "mobile" : "desktop";
  try {
    fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ planName, planType, amount, device }),
      mode: "no-cors"
    });
  } catch(e) { /* 靜默失敗，不影響使用者體驗 */ }
}
